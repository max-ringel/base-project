services:
  app:
    build:
      context: .
      args:
        - NVIM_CONFIG_REPOSITORY=${NVIM_CONFIG_REPOSITORY}
    volumes:
      - ./app:/app
    stdin_open: true
    tty: true
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GIT_USER_NAME=${GIT_USER_NAME}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL}
